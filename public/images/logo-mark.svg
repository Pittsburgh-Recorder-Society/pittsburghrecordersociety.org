<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" fill="none">
  <!-- Bridge arch -->
  <path d="M4 48 Q20 12 40 12 Q60 12 76 48" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none" />
  <!-- Bridge deck -->
  <line x1="0" y1="48" x2="80" y2="48" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
  <!-- Vertical cables -->
  <line x1="20" y1="28" x2="20" y2="48" stroke="currentColor" stroke-width="1.5" opacity="0.6" />
  <line x1="32" y1="18" x2="32" y2="48" stroke="currentColor" stroke-width="1.5" opacity="0.6" />
  <line x1="48" y1="18" x2="48" y2="48" stroke="currentColor" stroke-width="1.5" opacity="0.6" />
  <line x1="60" y1="28" x2="60" y2="48" stroke="currentColor" stroke-width="1.5" opacity="0.6" />
  <!-- Musical note sitting on the bridge arch -->
  <ellipse cx="42" cy="6" rx="4.5" ry="3.5" fill="currentColor" transform="rotate(-15 42 6)" />
  <line x1="46" y1="5" x2="46" y2="-10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  <!-- River waves below -->
  <path d="M0 54 Q10 51 20 54 Q30 57 40 54 Q50 51 60 54 Q70 57 80 54" stroke="currentColor" stroke-width="1.2" opacity="0.35" fill="none" />
</svg>
